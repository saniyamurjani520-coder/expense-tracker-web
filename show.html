<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table { margin: auto; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid black; }
        a { color: red; text-decoration: none; }
    </style>
</head>
<body>

    <h2>Your Expenses</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Action</th>
        </tr>

        {% for row in expenses %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>₹{{ row[2] }}</td>
            <td>
                <a href="/delete/{{ row[0] }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back</a>

</body>
</html>
